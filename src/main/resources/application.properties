spring.application.name=estoque-api

# PostgreSQL via Docker Compose
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Envers
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_auditoria
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true

# JWT
jwt.secret=4d6a7a3b8e9f1c2d5a4b7e8f3c2d1a9b4e7f8c3d2a1b9e8f7c6d5a4b3e2f1c0d
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Spring AI OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:sua-chave-aqui}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Porta
server.port=8089